<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');

        :root {
            --bg-blue: #1ab3ff;
            --border-purple: #3126a1;
            --border-cyan: #00e1ff;
            --card-white: #fcfcfc;
            --text-main: #333333;
            --opt-a: #ff8c00;
            --opt-a-dark: #cc7000;
            --opt-b: #33ccff;
            --opt-b-dark: #29a3cc;
            --opt-c: #4433cc;
            --opt-c-dark: #3629a3;
            --opt-d: #ffca28;
            --opt-d-dark: #cfa320;
            --chat-bot: #f0f7ff;
            --chat-user: #fff0db;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--border-purple);
            background-image: radial-gradient(circle at 50% 50%, var(--bg-blue) 0%, var(--border-purple) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: var(--text-main);
        }

        .mute-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--card-white);
            border: 3px solid var(--border-cyan);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 0 #cccccc;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .mute-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #cccccc;
        }

        .header-container {
            width: 100%;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .logo-box {
            position: relative;
            width: 70px;
            height: 70px;
            background: var(--card-white);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #cccccc, 0 10px 15px rgba(0,0,0,0.3);
            border: 3px solid var(--border-cyan);
            transition: transform 0.3s ease;
        }

        .svg-icon {
            width: 35px;
            height: 35px;
            fill: none;
            stroke: var(--opt-a);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .app-title {
            margin-top: 0.8rem;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--card-white);
            text-shadow: 0 3px 0 var(--border-purple), 0 5px 8px rgba(0,0,0,0.3);
            text-align: center;
        }

        .main-wrapper {
            width: 100%;
            max-width: 600px;
            padding: 0 15px 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        .q-card {
            background: var(--card-white);
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 8px 0 #e0e0e0, 0 15px 25px rgba(0,0,0,0.2), inset 0 0 0 4px rgba(0, 225, 255, 0.1);
            width: 100%;
            transition: transform 0.3s ease, opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
            max-height: 80vh;
        }

        .q-header {
            font-size: 1rem;
            color: var(--opt-a);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 700;
            text-align: center;
            display: flex;
            justify-content: space-between;
        }

        .q-title {
            font-size: 1.2rem;
            line-height: 1.3;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
            color: var(--border-purple);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            overflow-y: auto;
        }

        .option-btn {
            border: none;
            color: white;
            padding: 14px 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            width: 100%;
            text-align: center;
            outline: none;
        }
        .option-btn:active { transform: translateY(4px); }

        .opt-1 { background-color: var(--opt-a); box-shadow: 0 4px 0 var(--opt-a-dark); }
        .opt-1:active { box-shadow: 0 0 0 var(--opt-a-dark); }
        .opt-2 { background-color: var(--opt-b); box-shadow: 0 4px 0 var(--opt-b-dark); }
        .opt-2:active { box-shadow: 0 0 0 var(--opt-b-dark); }
        .opt-3 { background-color: var(--opt-c); box-shadow: 0 4px 0 var(--opt-c-dark); }
        .opt-3:active { box-shadow: 0 0 0 var(--opt-c-dark); }
        .opt-4 { background-color: var(--opt-d); box-shadow: 0 4px 0 var(--opt-d-dark); color: var(--border-purple); }
        .opt-4:active { box-shadow: 0 0 0 var(--opt-d-dark); }

        .fade-out { opacity: 0; transform: scale(0.95); }

        #chatContainer {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            flex-grow: 1;
        }

        .chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            background-color: #f5f5f5;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            min-height: 200px;
        }

        .chat-bubble {
            max-width: 90%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.3;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-bubble {
            background-color: var(--chat-bot);
            color: var(--border-purple);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 2px solid var(--border-cyan);
        }

        .user-bubble {
            background-color: var(--chat-user);
            color: var(--opt-a-dark);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 2px solid var(--opt-a);
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex-grow: 1;
            padding: 10px 12px;
            border-radius: 10px;
            border: 2px solid #ccc;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }
        .chat-input:focus { border-color: var(--border-cyan); }

        .chat-send-btn {
            background-color: var(--opt-b);
            border: none;
            border-radius: 10px;
            color: white;
            padding: 0 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 var(--opt-b-dark);
        }
        .chat-send-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 var(--opt-b-dark);
        }

        .chat-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 5px;
        }

        .chat-opt-btn {
            background-color: var(--opt-c);
            color: white;
            border: none;
            padding: 10px 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            text-align: left;
            box-shadow: 0 3px 0 var(--opt-c-dark);
            transition: transform 0.1s;
        }
        .chat-opt-btn:active { transform: translateY(3px); box-shadow: 0 0 0 var(--opt-c-dark); }

        /* Efectos 3D y mejoras solo para PC */
        @media (min-width: 1024px) {
            body { perspective: 1200px; }
            .main-wrapper { max-width: 700px; }
            .q-card { max-height: 700px; padding: 40px; box-shadow: 0 15px 0 #e0e0e0, 0 30px 40px rgba(0,0,0,0.3), inset 0 0 0 8px rgba(0, 225, 255, 0.1); }
            .logo-box { width: 100px; height: 100px; }
            .svg-icon { width: 50px; height: 50px; }
            .app-title { font-size: 2.5rem; }
            .q-title { font-size: 1.6rem; }
            .option-btn { font-size: 1.2rem; padding: 18px 20px; }
            .opt-1 { box-shadow: 0 8px 0 var(--opt-a-dark); }
            .opt-2 { box-shadow: 0 8px 0 var(--opt-b-dark); }
            .opt-3 { box-shadow: 0 8px 0 var(--opt-c-dark); }
            .opt-4 { box-shadow: 0 8px 0 var(--opt-d-dark); }
            .option-btn:active { transform: translateY(8px); }
            .chat-bubble { font-size: 1.1rem; padding: 14px 18px; }
            .chat-input { padding: 14px 18px; font-size: 1.1rem; }
            .chat-send-btn { padding: 0 25px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="quiz.mp3" loop autoplay></audio>
    <button id="muteBtn" class="mute-btn">🔊</button>

    <header class="header-container">
        <div class="logo-box" id="logo3d">
            <svg class="svg-icon" viewBox="0 0 24 24">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                <path d="M12 8l3-3 3 3M15 5v14" stroke="var(--opt-b)" stroke-width="2"></path>
            </svg>
        </div>
        <h1 class="app-title" id="title3d">Control AI</h1>
    </header>

    <main class="main-wrapper">
        <div class="q-card" id="card3d">
            
            <div id="quizContainer">
                <div class="q-header">
                    <span>Reflexión</span>
                    <span id="progressIndicator">1 / 15</span>
                </div>
                <h3 class="q-title" id="questionText">¿Qué tan frecuente usas la IA en tus actividades académicas?</h3>
                <div class="options-grid" id="optionsContainer">
                    <button class="option-btn opt-1" onclick="nextQuestion()">Constantemente (Para casi todo)</button>
                    <button class="option-btn opt-2" onclick="nextQuestion()">Frecuentemente (Como apoyo habitual)</button>
                    <button class="option-btn opt-3" onclick="nextQuestion()">A veces (Solo cuando estoy confundido)</button>
                    <button class="option-btn opt-4" onclick="nextQuestion()">Nunca (Hago todo manualmente)</button>
                </div>
            </div>

            <div id="chatContainer">
                <div class="q-header">
                    <span style="color: var(--opt-b);">Asistente ControlAI</span>
                    <span>Guía Interactiva</span>
                </div>
                <div class="chat-history" id="chatHistory">
                </div>
                
                <div id="chatOptionsArea" class="chat-options" style="display: none; margin-bottom: 10px;">
                </div>

                <div class="chat-input-area" id="chatInputArea">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Ej: Tengo que hacer un resumen..." autocomplete="off">
                    <button class="chat-send-btn" onclick="handleUserSubmit()">➤</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        const bgMusic = document.getElementById('bgMusic');
        const muteBtn = document.getElementById('muteBtn');
        muteBtn.addEventListener('click', () => {
            if (bgMusic.muted) { bgMusic.muted = false; muteBtn.innerText = '🔊'; } 
            else { bgMusic.muted = true; muteBtn.innerText = '🔇'; }
        });
        const playAudio = () => { bgMusic.play().catch(e => {}); };
        window.addEventListener('load', playAudio);
        document.addEventListener('click', playAudio, { once: true });

        const questions = [
            { q: "¿Qué tan frecuente usas la IA en tus actividades académicas / trabajos de clase?", o: ["Constantemente", "Frecuentemente", "A veces", "Nunca"] },
            { q: "¿Cuánto tiempo al día pasas utilizando herramientas de IA?", o: ["Más de 4 horas", "Entre 2 y 4 horas", "Menos de 1 hora", "Casi nada"] },
            { q: "¿Qué tareas podrías hacer por tu cuenta sin ayuda de una IA?", o: ["Muy pocas", "Las más sencillas", "La mayoría", "Todas sin problema"] },
            { q: "¿Has dejado de aprender algo porque la IA lo hace por ti?", o: ["Sí, prefiero que lo resuelva", "A veces", "No, verifico lo que hace", "Nunca"] },
            { q: "¿Cuándo fue la última vez que resolviste un problema complejo sin ayuda tecnológica?", o: ["No lo recuerdo", "Hace varias semanas", "Hace unos días", "Hoy mismo"] },
            { q: "¿Te resulta difícil tomar decisiones sin pedir opinión a una IA?", o: ["Sí, dudo mucho", "A veces", "Rara vez", "No confío en mi criterio"] },
            { q: "¿Sientes ansiedad o incomodidad cuando no puedes acceder a una IA?", o: ["Mucha", "Un poco", "Casi nada", "Nada en absoluto"] },
            { q: "¿Cuántas veces consultas una IA antes de intentar encontrar una respuesta por tu cuenta?", o: ["Siempre", "A veces", "Rara vez", "Primero uso mis recursos"] },
            { q: "¿Hay alguna tarea en la que dependes demasiado de la IA?", o: ["Redacción", "Matemáticas", "Ideas", "No tengo dependencia"] },
            { q: "¿Qué has aprendido realmente gracias a la IA y qué solo has copiado?", o: ["Mayormente copiado", "Algunas cosas", "Mitad y mitad", "He aprendido mucho"] },
            { q: "¿Confías más en tu criterio o en las respuestas de una IA?", o: ["Confío en la IA", "Trato de revisar", "En mi conocimiento", "Solo en mi criterio"] },
            { q: "¿Crees que tu creatividad ha mejorado o disminuido desde que empezaste a usar IA?", o: ["Ha disminuido", "Se mantiene", "Ha mejorado", "Me ha potenciado"] },
            { q: "¿Qué ganarías si redujeras tu uso de IA durante una semana?", o: ["Perdería tiempo", "Frustración", "Mejor concentración", "Independencia"] },
            { q: "¿Cuál sería tu primer paso para reducir gradualmente su uso?", o: ["No sé", "Límites de tiempo", "Intentar yo primero", "Desinstalar atajos"] },
            { q: "¿Cómo imaginas tu rutina diaria si usaras la IA solo cuando fuera estrictamente necesaria?", o: ["Muy lenta", "Más esfuerzo mental", "Más productiva", "Más inteligente"] }
        ];

        let currentIndex = 0;

        function nextQuestion() {
            const card = document.getElementById('card3d');
            card.classList.add('fade-out');

            setTimeout(() => {
                currentIndex++;
                
                if (currentIndex < questions.length) {
                    document.getElementById('progressIndicator').innerText = `${currentIndex + 1} / 15`;
                    document.getElementById('questionText').innerText = questions[currentIndex].q;
                    const btns = document.querySelectorAll('#optionsContainer .option-btn');
                    for(let i=0; i<4; i++) btns[i].innerText = questions[currentIndex].o[i];
                } else {
                    document.getElementById('progressIndicator').innerText = "Completado";
                    document.getElementById('questionText').innerText = "¡Excelente reflexión! Ahora, ControlAI te guiará paso a paso sin darte la respuesta directa.";
                    document.getElementById('optionsContainer').innerHTML = `
                        <button class="option-btn opt-1" onclick="startChat()" style="font-size: 1.1rem; padding: 15px;">
                            💬 Hablar con ControlAI
                        </button>
                        <button class="option-btn opt-3" onclick="location.reload()" style="font-size: 1.1rem; padding: 15px;">
                            Volver a intentar
                        </button>`;
                }
                card.classList.remove('fade-out');
            }, 300);
        }

        let groqKey = "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";
        let activeQuiz = [];
        let activeQuizIndex = 0;

        function startChat() {
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            addBubble("¡Hola! Soy ControlAI. Dime qué necesitas resolver y generaré un pequeño cuestionario para guiarte a la respuesta por ti mismo.", "bot");
        }

        function addBubble(text, sender) {
            const chatHistory = document.getElementById('chatHistory');
            const bubble = document.createElement('div');
            bubble.classList.add('chat-bubble', sender === 'bot' ? 'bot-bubble' : 'user-bubble');
            bubble.innerText = text;
            chatHistory.appendChild(bubble);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function handleUserSubmit() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            addBubble(text, "user");
            input.value = "";
            document.getElementById('chatInputArea').style.display = 'none'; 
            
            addBubble("Analizando y creando cuestionario...", "bot");
            fetchGroqQuiz(text);
        }

        async function fetchGroqQuiz(prompt) {
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${groqKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            {
                                role: "system", 
                                content: "Eres un tutor. Responde ÚNICAMENTE con un arreglo JSON válido y estricto. NO uses markdown ni texto adicional. Formato: [{\"q\":\"pregunta\",\"o\":[\"op1\",\"op2\",\"op3\",\"op4\"],\"c\":0}] Crea 5 preguntas de opción múltiple relacionadas al problema del usuario."
                            },
                            {
                                role: "user",
                                content: prompt
                            }
                        ],
                        temperature: 0.3
                    })
                });
                
                const data = await response.json();
                let content = data.choices[0].message.content;
                let jsonMatch = content.match(/\[[\s\S]*\]/);
                activeQuiz = JSON.parse(jsonMatch[0]);
                activeQuizIndex = 0;
                renderCurrentQuizStep();
                
            } catch (error) {
                addBubble("Hubo un error al generar el cuestionario con Llama. Intenta detallar más tu pregunta.", "bot");
                document.getElementById('chatInputArea').style.display = 'flex';
            }
        }

        async function fetchGroqExtra(wrongQuestion) {
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${groqKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            {
                                role: "system", 
                                content: "El usuario se equivocó. Responde ÚNICAMENTE con JSON estricto. Un array con 1 pregunta extra fácil para que entienda. Formato: [{\"q\":\"pregunta\",\"o\":[\"op1\",\"op2\",\"op3\",\"op4\"],\"c\":0}]"
                            },
                            {
                                role: "user",
                                content: wrongQuestion
                            }
                        ],
                        temperature: 0.3
                    })
                });
                
                const data = await response.json();
                let content = data.choices[0].message.content;
                let jsonMatch = content.match(/\[[\s\S]*\]/);
                let extraQ = JSON.parse(jsonMatch[0])[0];
                activeQuiz.splice(activeQuizIndex, 0, extraQ);
                renderCurrentQuizStep();
            } catch (error) {
                activeQuizIndex++;
                renderCurrentQuizStep();
            }
        }

        function renderCurrentQuizStep() {
            document.getElementById('chatOptionsArea').innerHTML = '';
            
            if (activeQuizIndex >= activeQuiz.length) {
                addBubble("¡Excelente! Has completado el cuestionario y descubierto la respuesta por tu cuenta.", "bot");
                document.getElementById('chatInputArea').style.display = 'flex';
                return;
            }

            let step = activeQuiz[activeQuizIndex];
            addBubble(`Pregunta ${activeQuizIndex + 1}: ${step.q}`, "bot");

            const optionsArea = document.getElementById('chatOptionsArea');
            step.o.forEach((optText, i) => {
                const btn = document.createElement('button');
                btn.classList.add('chat-opt-btn');
                btn.innerText = optText;
                btn.onclick = () => handleQuizAnswer(optText, i, step.c, step.q);
                optionsArea.appendChild(btn);
            });
            optionsArea.style.display = 'flex';
            
            const chatHistory = document.getElementById('chatHistory');
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function handleQuizAnswer(text, selectedIndex, correctIndex, questionText) {
            addBubble(text, "user");
            document.getElementById('chatOptionsArea').style.display = 'none';
            document.getElementById('chatOptionsArea').innerHTML = '';
            
            if (selectedIndex === correctIndex) {
                addBubble("¡Correcto!", "bot");
                activeQuizIndex++;
                setTimeout(() => renderCurrentQuizStep(), 800);
            } else {
                addBubble("Incorrecto. Analicemos esto con una pregunta extra.", "bot");
                fetchGroqExtra(questionText);
            }
        }
    </script>
</body>
</html>
